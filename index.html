<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>System Override Challenge</title>
<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Courier New', Courier, monospace;
    background-color: #0a0f0d;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #00ff66;
    overflow: hidden;
}

.terminal-box {
    width: 350px;
    padding: 25px;
    border: 2px solid #00ff66;
    border-radius: 10px;
    background: #050706;
    box-shadow: 0 0 20px rgba(0, 255, 102, 0.3);
    text-align: left;
}

.header {
    border-bottom: 1px solid #00ff66;
    padding-bottom: 10px;
    margin-bottom: 15px;
    font-weight: bold;
    font-size: 14px;
}

h2 {
    font-size: 20px;
    margin: 0 0 10px 0;
    text-transform: uppercase;
    letter-spacing: 2px;
}

p {
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: 15px;
}

.input-zone {
    margin-top: 15px;
}

input {
    width: 90%;
    padding: 10px;
    background: #000;
    border: 1px solid #00ff66;
    color: #00ff66;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    outline: none;
    margin-bottom: 10px;
    border-radius: 5px;
}

button {
    width: 97%;
    padding: 12px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 15px;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    background-color: #00ff66;
    color: #000;
    transition: 0.3s;
    text-transform: uppercase;
}

button:hover {
    background-color: #003311;
    color: #00ff66;
    box-shadow: 0 0 10px #00ff66;
}

.status-log {
    margin-top: 15px;
    font-size: 13px;
    color: #ff3333;
    min-height: 20px;
}

.success-text {
    color: #00ff66 !important;
    font-weight: bold;
}
</style>
</head>
<body>

<div class="terminal-box">
    <div class="header">💾 SYSTEM://
