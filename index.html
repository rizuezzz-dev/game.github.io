<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pertanyaan Penting! 🤔</title>
<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #ffe4e1, #ffb6c1);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #4a4a4a;
    overflow: hidden;
}

.box {
    width: 320px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(10px);
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    position: relative;
}

.gif-container {
    font-size: 50px;
    margin-bottom: 10px;
}

h2 {
    font-size: 20px;
    color: #ff477e;
    margin-bottom: 25px;
}

.btn-group {
    display: flex;
    justify-content: space-around;
    align-items: center;
    height: 50px;
    position: relative;
}

button {
    padding: 10px 25px;
    border: none;
    border-radius: 50px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

#btnYa {
    background-color: #ff477e;
    color: white;
}

#btnGa {
    background-color: #bdc3c7;
    color: #7f8c8d;
    position: absolute;
}
</style>
</head>
<body>

<div class="box">
    <div class="gif-container" id="emoji">🤨</div>
    <h2 id="pertanyaan">Mau nanya serius... Kamu beneran sayang gak sama aku?</h2>
    
    <div class="btn-group">
        <button id="btnYa" onclick="pilihYa()">Sayang!</button>
        <button id="btnGa" onmouseover="kabur()" onclick="kabur()">Gak</button>
    </div>
</div>

<script>
function kabur() {
    const btnGa = document.getElementById("btnGa");
    
    // Mengacak posisi tombol "Gak" biar gak bisa diklik
    const x = Math.random() * (window.innerWidth - btnGa.offsetWidth - 50);
    const y = Math.random() * (window.innerHeight - btnGa.offsetHeight - 50);
    
    // Pindahkan tombol keluar dari kotak ke posisi acak di layar
    btnGa.style.position = "fixed";
    btnGa.style.left = x + "px";
    btnGa.style.top = y + "px";
}

function pilihYa() {
    const pertanyaan = document.getElementById("pertanyaan");
    const emoji = document.getElementById("emoji");
    const btnGroup = document.querySelector(".btn-group");
    
    // Mengubah konten saat berhasil klik "Sayang!"
    emoji.innerText = "🥰";
    pertanyaan.innerHTML = "<b>Yeeeaaay! Aku juga sayang banget sama kamu! 🥳❤️</b><br><br>Selesai! Gak ada pilihan lain kan? Hahaha. Have a great day!";
    
    // Sembunyikan tombol-tombolnya
    btnGroup.style.display = "none";
}
</script>

</body>
</html>
