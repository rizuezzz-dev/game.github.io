<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pertanyaan Penting! 🤔</title>
<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #ffe4e1, #ffb6c1);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #4a4a4a;
    overflow: hidden;
}

.box {
    width: 320px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(10px);
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    position: relative; /* Menjadikan kotak sebagai patokan posisi tombol */
}

.gif-container {
    font-size: 50px;
    margin-bottom: 10px;
}

h2 {
    font-size: 20px;
    color: #ff477e;
    margin-bottom: 25px;
}

.btn-group {
    display: flex;
    justify-content: space-around;
    align-items: center;
    height: 60px;
    position: relative;
}

button {
    padding: 10px 25px;
    border: none;
    border-radius: 50px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s ease;
}

#btnYa {
    background-color: #ff477e;
    color: white;
}

#btnGa {
    background-color: #bdc3c7;
    color: #7f8c8d;
    position: absolute;
    right: 30px; /* Posisi awal di sebelah kanan */
}
</style>
</head>
<body>

<div class="box" id="mainBox">
    <div class="gif-container" id="emoji">🤨</div>
    <h2 id="pertanyaan">Mau nanya serius... Kamu beneran sayang gak sama aku?</h2>
    
    <div class="btn-group">
        <button id="btnYa" onclick="pilihYa()">Sayang!</button>
        <button id="btnGa" onmouseover="kabur()" ontouchstart="kabur()" onclick="kabur()">Gak</button>
    </div>
</div>

<script>
function kabur() {
    const btnGa = document.getElementById("btnGa");
    const box = document.getElementById("mainBox");
    
    // Batasi pergerakan tombol HANYA di dalam area kotak putih (.box)
    // Dikurangi ukuran tombol agar tidak menabrak pinggiran kotak
    const maxX = box.clientWidth - btnGa.offsetWidth - 20;
    const maxY = box.clientHeight - btnGa.offsetHeight - 20;
    
    let randomX = Math.floor(Math.random() * maxX);
    let randomY = Math.floor(Math.random() * maxY);
    
    // Mencegah tombol "Gak" menumpuk di area tombol "Sayang!" (bagian bawah kotak)
    // Jika koordinatnya terlalu dekat dengan tombol "Sayang", kita geser paksa ke atas
    if (randomY > 150 && randomX < 120) {
        randomY -= 80;
    }

    // Ubah posisi berdasarkan area kotak putih, bukan layar penuh lagi
    btnGa.style.position = "absolute";
    btnGa.style.left = randomX + "px";
    btnGa.style.top = randomY + "px";
}

function pilihYa() {
    const pertanyaan = document.getElementById("pertanyaan");
    const emoji = document.getElementById("emoji");
    const btnGroup = document.querySelector(".btn-group");
    
    emoji.innerText = "🥰";
    pertanyaan.innerHTML = "<b>Yeeeaaay! Aku juga sayang banget sama kamu! 🥳❤️</b><br><br>Selesai! Gak ada pilihan lain kan? Hahaha. Have a great day!";
    
    btnGroup.style.display = "none";
}
</script>

</body>
</html>
